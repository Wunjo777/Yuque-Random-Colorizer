<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #333;
    }
    h2 {
      font-size: 15px;
      margin-bottom: 12px;
      color: #1a1a1a;
    }
    p {
      color: #666;
      line-height: 1.5;
      margin-bottom: 8px;
    }
    .btn {
      display: inline-block;
      padding: 8px 16px;
      background: #1890ff;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      width: 100%;
    }
    .btn:hover { background: #40a9ff; }
    .shortcut {
      display: inline-block;
      padding: 2px 6px;
      background: #f0f0f0;
      border-radius: 3px;
      font-size: 11px;
      color: #666;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h2>🎨 画板随机着色</h2>
  <p>在语雀画板页面点击下方按钮激活框选模式，然后拖拽选择区域进行着色。</p>
  <button class="btn" id="activateBtn">激活着色工具</button>
  <p style="margin-top: 10px; text-align: center;">
    <span class="shortcut">ESC 取消</span>
  </p>
  <script src="popup.js"></script>
</body>
</html>
